<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Londra Gezi Haritam</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f0;--surface:#fff;--surface2:#f8f8f5;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#1a1a1a;--muted:#777;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-border:#bfdbfe;
  --danger:#dc2626;--success:#16a34a;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
  --radius:10px;--sidebar:330px;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;}
#layout{display:flex;height:100vh;}
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--surface);border-right:1px solid var(--border2);display:flex;flex-direction:column;z-index:100;box-shadow:2px 0 12px rgba(0,0,0,0.06);}
#header{padding:16px 18px 12px;border-bottom:1px solid var(--border);}
#header h1{font-size:16px;font-weight:600;color:var(--accent);}
#header p{font-size:11px;color:var(--muted);margin-top:2px;}
#tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:10px 0;font-size:12px;font-weight:500;text-align:center;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:none;font-family:var(--font);transition:all 0.15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab:hover{color:var(--text);background:var(--surface2);}
.counter{display:inline-block;background:var(--accent-bg);color:var(--accent);border-radius:10px;font-size:11px;padding:1px 6px;margin-left:4px;}
#pin-list{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:#ddd transparent;}
.empty-hint{text-align:center;color:var(--muted);font-size:13px;padding:28px 16px;line-height:1.7;}
.cat-group{margin-bottom:6px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
.cat-header{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;background:var(--surface2);user-select:none;transition:background 0.12s;}
.cat-header:hover{background:#ebebea;}
.cat-stripe{width:4px;height:20px;border-radius:2px;flex-shrink:0;}
.cat-icon{font-size:14px;}
.cat-name{font-size:13px;font-weight:500;flex:1;}
.cat-count{font-size:11px;font-family:var(--mono);color:var(--muted);background:rgba(0,0,0,0.06);padding:1px 7px;border-radius:8px;}
.cat-chevron{font-size:11px;color:var(--muted);transition:transform 0.2s;display:inline-block;}
.cat-chevron.open{transform:rotate(90deg);}
.cat-pins{display:none;background:var(--surface);}
.cat-pins.open{display:block;}
.pcard{padding:10px 12px 8px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.12s;position:relative;}
.pcard:last-child{border-bottom:none;}
.pcard:hover{background:var(--surface2);}
.pcard.active{background:var(--accent-bg);}
.pcard-top{display:flex;align-items:center;gap:7px;}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pname{font-size:12px;font-weight:500;flex:1;}
.ptime{font-size:10px;font-family:var(--mono);color:var(--accent);background:var(--accent-bg);padding:1px 5px;border-radius:3px;}
.pday-badge{font-size:10px;color:var(--muted);padding-left:16px;margin-top:2px;}
.pnote{font-size:11px;color:var(--muted);margin-top:3px;padding-left:16px;line-height:1.4;}
.pinfo-preview{font-size:10px;color:#555;padding-left:16px;line-height:1.8;border-top:1px solid var(--border);padding-top:4px;margin-top:5px;}
.pgmaps{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--accent);padding-left:16px;margin-top:3px;text-decoration:none;}
.pgmaps:hover{text-decoration:underline;}
.pdel{position:absolute;top:8px;right:8px;font-size:11px;color:var(--danger);cursor:pointer;opacity:0;transition:opacity 0.15s;background:none;border:none;font-family:var(--font);padding:2px 4px;}
.pcard:hover .pdel{opacity:1;}
#add-panel{padding:12px;border-top:1px solid var(--border);background:var(--surface);overflow-y:auto;display:none;}
.section-label{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
#click-hint{font-size:12px;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-border);border-radius:8px;padding:7px 12px;margin-bottom:8px;text-align:center;}
#click-hint.ready{color:var(--success);background:#f0fdf4;border-color:#bbf7d0;}
.form-group{margin-bottom:8px;}
.form-group label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px;}
.form-group input,.form-group textarea,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;transition:border-color 0.15s;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent);}
.form-group textarea{height:48px;resize:none;}
.row2{display:flex;gap:8px;}
.row2 .form-group{flex:1;}
#cat-selector{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.cat-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:2px solid transparent;cursor:pointer;font-size:12px;font-family:var(--font);background:var(--surface2);color:var(--text);transition:all 0.15s;}
.cat-btn.sel{color:white;}
.new-cat-row{display:flex;gap:6px;margin-bottom:8px;}
.new-cat-row input{flex:1;padding:6px 10px;font-size:12px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);outline:none;}
.new-cat-row input:focus{border-color:var(--accent);}
.new-cat-row button{padding:6px 11px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font);}
#info-box{border-radius:8px;padding:9px 12px;margin-bottom:8px;font-size:12px;line-height:1.8;display:none;}
#info-box.found{background:#fffbeb;border:1px solid #fde68a;}
#info-box.notfound{background:var(--surface2);border:1px solid var(--border2);color:var(--muted);}
#info-box .ai-row{display:flex;gap:6px;}
#info-box .ai-label{color:var(--muted);min-width:90px;font-size:11px;flex-shrink:0;}
#info-box .ai-val{color:var(--text);font-weight:500;}
#btn-info{width:100%;padding:7px;background:var(--surface2);color:var(--accent);border:1px solid var(--accent-border);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s;margin-bottom:7px;display:none;}
#btn-info:hover{background:var(--accent-bg);}
#btn-save{width:100%;padding:10px;background:var(--accent);color:white;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);transition:all 0.15s;margin-top:4px;}
#btn-save:hover{background:#1d4ed8;}
#btn-save:active{transform:scale(0.98);}
#share-panel{padding:14px;display:none;flex-direction:column;gap:10px;overflow-y:auto;flex:1;}
.share-url-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius);padding:12px;}
.share-url-box p{font-size:11px;color:var(--muted);margin-bottom:6px;}
.url-text{font-family:var(--mono);font-size:10px;color:var(--accent);word-break:break-all;line-height:1.5;max-height:70px;overflow:auto;}
#btn-copy{width:100%;padding:8px;background:transparent;color:var(--accent);border:1px solid var(--accent-border);border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all 0.15s;margin-top:7px;}
#btn-copy:hover{background:var(--accent-bg);}
#btn-copy.copied{color:var(--success);border-color:#bbf7d0;}
.share-info{font-size:12px;color:var(--muted);line-height:1.6;}
.share-info strong{color:var(--text);}
.pin-summary{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;}
.pin-summary h3{font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.summary-item{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--border);}
.summary-item:last-child{border-bottom:none;}
.summary-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.summary-name{font-size:12px;flex:1;}
.summary-time{font-size:11px;font-family:var(--mono);color:var(--accent);}
#map{flex:1;z-index:1;position:relative;}
#search-box{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:500;width:320px;}
#search-inp{width:100%;padding:10px 16px;border-radius:24px;border:none;box-shadow:0 2px 16px rgba(0,0,0,0.18);font-size:14px;font-family:var(--font);outline:none;background:white;color:var(--text);}
#search-results{background:white;border-radius:12px;margin-top:6px;box-shadow:0 4px 20px rgba(0,0,0,0.15);overflow:hidden;display:none;max-height:260px;overflow-y:auto;}
.search-item{padding:10px 16px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f0f0;color:var(--text);}
.search-item:last-child{border-bottom:none;}
.search-item:hover{background:var(--accent-bg);color:var(--accent);}
.search-item small{display:block;font-size:11px;color:var(--muted);margin-top:1px;}
#map-overlay{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.92);backdrop-filter:blur(8px);border:1px solid rgba(0,0,0,0.1);border-radius:20px;padding:7px 18px;font-size:12px;color:#555;z-index:500;pointer-events:none;transition:opacity 0.3s;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
#map-overlay.hidden{opacity:0;}
.leaflet-container{font-family:var(--font);}
.custom-popup .leaflet-popup-content-wrapper{background:white;border:1px solid rgba(0,0,0,0.1);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,0.12);}
.custom-popup .leaflet-popup-tip{background:white;}
.custom-popup .leaflet-popup-content{margin:13px 15px;min-width:185px;}
.popup-name{font-size:14px;font-weight:600;margin-bottom:5px;}
.popup-time{font-size:12px;color:var(--accent);margin-bottom:3px;}
.popup-note{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:5px;}
.popup-info{font-size:11px;line-height:1.9;border-top:1px solid #eee;padding-top:5px;margin-top:3px;}
.popup-gmaps{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);text-decoration:none;margin-top:7px;font-weight:500;}
.popup-gmaps:hover{text-decoration:underline;}
@media(max-width:640px){:root{--sidebar:100vw;}#layout{flex-direction:column;}#sidebar{height:55vh;min-width:unset;width:100%;}#map{height:45vh;}}
</style>
</head>
<body>
<div id="layout">
  <div id="sidebar">
    <div id="header">
      <h1>✈ Londra Gezi Haritam</h1>
      <p>28 Mayıs – 5 Haziran 2026</p>
    </div>
    <div id="tabs">
      <button class="tab active" onclick="switchTab('pins')">📍 Pinler <span class="counter" id="cnt">0</span></button>
      <button class="tab" onclick="switchTab('add')">＋ Ekle</button>
      <button class="tab" onclick="switchTab('share')">🔗 Paylaş</button>
    </div>
    <div id="pin-list"></div>
    <div id="add-panel">
      <div class="section-label">Yeni Pin Ekle</div>
      <div id="click-hint">👆 Önce haritada bir yere tıkla</div>
      <div class="form-group">
        <label>Yer adı</label>
        <input type="text" id="inp-name" placeholder="örn: Tower Bridge" maxlength="60" oninput="onNameInput()"/>
      </div>
      <button id="btn-info" onclick="lookupPlace()">🔍 Bilgileri Getir</button>
      <div id="info-box"></div>
      <div class="form-group">
        <label>Kategori</label>
        <div id="cat-selector"></div>
        <div class="new-cat-row">
          <input type="text" id="new-cat-inp" placeholder="Yeni kategori..." maxlength="20"/>
          <button onclick="addNewCategory()">＋ Ekle</button>
        </div>
      </div>
      <div class="row2">
        <div class="form-group">
          <label>Saat</label>
          <input type="time" id="inp-time" value="10:00"/>
        </div>
        <div class="form-group">
          <label>Gün</label>
          <select id="inp-day">
            <option value="">—</option>
            <option>28 Mayıs</option><option>29 Mayıs</option><option>30 Mayıs</option>
            <option>31 Mayıs</option><option>1 Haziran</option><option>2 Haziran</option>
            <option>3 Haziran</option><option>4 Haziran</option><option>5 Haziran</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Not</label>
        <textarea id="inp-note" placeholder="Hatırlatmalar, öneriler..."></textarea>
      </div>
      <button id="btn-save" onclick="savePin()">📌 Haritaya Ekle</button>
    </div>
    <div id="share-panel">
      <p class="share-info">Tüm pinlerin <strong>link içine kodlanır</strong> — sunucu yok, hesap yok. Linki paylaştığın herkes haritanı görür.</p>
      <div class="share-url-box">
        <p>Paylaşım linki:</p>
        <div class="url-text" id="share-url">Henüz pin eklenmedi.</div>
        <button id="btn-copy" onclick="copyLink()">📋 Linki Kopyala</button>
      </div>
      <div class="pin-summary" id="pin-summary"></div>
    </div>
  </div>
  <div id="map">
    <div id="search-box">
      <input type="text" id="search-inp" placeholder="🔍 Londra'da yer ara..." autocomplete="off"/>
      <div id="search-results"></div>
    </div>
    <div id="map-overlay">🖱 Haritaya tıklayarak pin ekle</div>
  </div>
</div>

<script>
/* ================================================================
   PLACE DATABASE — 100+ London locations
   ================================================================ */
const PLACES = {
  // MÜZELER & GALERİLER
  "british museum":          {hours:"10:00–17:00",duration:"2–4 saat",entry:"Ücretsiz",tip:"Rosetta Taşı ve Mısır koleksiyonu mutlaka görülmeli. Cuma 20:30'a kadar açık."},
  "national gallery":        {hours:"10:00–18:00",duration:"1–3 saat",entry:"Ücretsiz",tip:"Van Gogh, Da Vinci, Monet eserleri burada. Cuma 21:00'e kadar açık."},
  "natural history museum":  {hours:"10:00–17:50",duration:"2–3 saat",entry:"Ücretsiz",tip:"Dinozor iskeleti ve mavi balina sergiyi kaçırma. Hops Museum kafesi iyi."},
  "victoria and albert museum":{hours:"10:00–17:45",duration:"2–3 saat",entry:"Ücretsiz",tip:"Moda, tasarım ve dekoratif sanat. Cuma akşamları geç saate kadar açık."},
  "v&a":                     {hours:"10:00–17:45",duration:"2–3 saat",entry:"Ücretsiz",tip:"Moda, tasarım ve dekoratif sanat. Cuma akşamları geç saate kadar açık."},
  "tate modern":             {hours:"10:00–18:00",duration:"2–3 saat",entry:"Ücretsiz",tip:"Thames kenarında, çatıdan şehir manzarası harika. Cuma–Cumartesi 22:00'e kadar."},
  "tate britain":            {hours:"10:00–18:00",duration:"1–2 saat",entry:"Ücretsiz",tip:"Turner koleksiyonu en meşhuru. Millbank'ta sakin bir müze."},
  "science museum":          {hours:"10:00–18:00",duration:"2–3 saat",entry:"Ücretsiz",tip:"Çocuklar için idealdir ama yetişkinler de eğlenir. IMAX bileti ayrı alınır."},
  "national portrait gallery":{hours:"10:00–18:00",duration:"1–2 saat",entry:"Ücretsiz",tip:"Kraliyet ailesinden Shakespeae'ye İngiliz tarihinin yüzleri burada."},
  "museum of london":        {hours:"10:00–18:00",duration:"1–2 saat",entry:"Ücretsiz",tip:"Londra'nın tarihini anlatan zengin koleksiyon."},
  "imperial war museum":     {hours:"10:00–18:00",duration:"2–3 saat",entry:"Ücretsiz",tip:"Holokost sergisi çok etkileyici. Hafta sonları kalabalık olabilir."},
  "national maritime museum":{hours:"10:00–17:00",duration:"1–2 saat",entry:"Ücretsiz",tip:"Greenwich'te, Cutty Sark ile birlikte ziyaret edilebilir."},
  "courtauld gallery":       {hours:"10:00–18:00",duration:"1–2 saat",entry:"£9",tip:"Empresyonist eserler için Londra'nın en iyi gizli müzesi."},
  "wallace collection":      {hours:"10:00–17:00",duration:"1–2 saat",entry:"Ücretsiz",tip:"Muhteşem bir konakta Fransız sanatı. Oxford Street yakını."},
  "serpentine gallery":      {hours:"10:00–18:00",duration:"30–60 dk",entry:"Ücretsiz",tip:"Hyde Park içinde, modern sanat. Yaz pavilion projeleri meşhur."},
  "design museum":           {hours:"10:00–18:00",duration:"1–2 saat",entry:"£15–£20",tip:"Kensington'da modern tasarım odaklı. Özel sergiler ücretlidir."},
  "saatchi gallery":         {hours:"10:00–18:00",duration:"1–2 saat",entry:"Ücretsiz",tip:"Chelsea'de çağdaş sanat. Sergiler sık değişir."},
  "hayward gallery":         {hours:"11:00–19:00",duration:"1–2 saat",entry:"£10–£18",tip:"Southbank'ta çarpıcı çağdaş sergileriyle tanınır."},

  // TARİHİ YERLER & SİMGELER
  "big ben":                 {hours:"Dışarıdan 24 saat",duration:"20–30 dk",entry:"Ücretsiz (dış)",tip:"En iyi fotoğraf için Westminster Köprüsü'nden çek. İçi tura katılımla gezilebilir."},
  "houses of parliament":    {hours:"Tur saatleri değişir",duration:"1–2 saat",entry:"£25–£30 (tur)",tip:"Parlamento tatildeyken daha fazla bölüm açılır. Online ön kayıt şart."},
  "tower of london":         {hours:"09:00–17:30",duration:"2–3 saat",entry:"£29.90",tip:"Kraliyet mücevherleri için mutlaka git. Yeoman Warder turu çok eğlenceli."},
  "tower bridge":            {hours:"09:30–18:00",duration:"1–1.5 saat",entry:"£14.80",tip:"Cam zemin 42m yükseklikte. Gün batımında en güzel görünümü."},
  "buckingham palace":       {hours:"Yaz ayları 09:30–19:30",duration:"1–2 saat",entry:"£30 (yaz)",tip:"Nöbet değişimi 11:00'de, erken git. Yaz aylarında içi açılır."},
  "st paul's cathedral":     {hours:"08:30–16:00",duration:"1–2 saat",entry:"£23",tip:"Fısıldayan galeri akustiği inanılmaz. Kubbeye çıkmak için fit olmak lazım."},
  "westminster abbey":       {hours:"09:30–15:30",duration:"1–2 saat",entry:"£27",tip:"Newton, Darwin ve kraliyet türbeleri burada. Pazartesi kapalı."},
  "greenwich":               {hours:"Gün boyu",duration:"Yarım gün",entry:"Ücretsiz (park)",tip:"Meridyen Hattı üzerinde fotoğraf çek, National Maritime Museum gez."},
  "greenwich park":          {hours:"06:00–21:00",duration:"1–2 saat",entry:"Ücretsiz",tip:"Tepeden Londra panoraması muhteşem. Geyikler serbest geziyor."},
  "cutty sark":              {hours:"10:00–17:00",duration:"1 saat",entry:"£18",tip:"Dünyanın en hızlı çay gemisi. Greenwich'teki diğer yerlerle birlikte ziyaret et."},
  "kensington palace":       {hours:"10:00–18:00",duration:"1–2 saat",entry:"£17–£22",tip:"Prenses Diana koleksiyonu ilgi görüyor. Kensington Bahçeleri ücretsiz."},
  "hampton court palace":    {hours:"10:00–18:00",duration:"3–4 saat",entry:"£27",tip:"Londra dışında ama değer. Labirent ve Tudor mutfakları çok ilginç."},
  "shakespeare's globe":     {hours:"Tur 10:00–17:00",duration:"1–2 saat",entry:"£17 (tur)",tip:"Gösteriyi izlemek en iyi deneyim. Sahne önü biletleri ucuz ama ayakta."},
  "southwark cathedral":     {hours:"08:00–18:00",duration:"30 dk",entry:"Ücretsiz",tip:"Borough Market'in yanında, sessiz ve güzel. Shakespeare anıtı var içinde."},
  "st james's palace":       {hours:"Dışarıdan",duration:"15–20 dk",entry:"Ücretsiz",tip:"İçi halka açık değil ama dışı fotoğraflanabilir."},
  "trafalgar square":        {hours:"24 saat",duration:"30–45 dk",entry:"Ücretsiz",tip:"Nelson Sütunu önünde fotoğraf şart. Çevresi galeri dolu."},
  "piccadilly circus":       {hours:"24 saat",duration:"20–30 dk",entry:"Ücretsiz",tip:"Gece de çok güzel. Eros heykeli ve reklam panolarının önünde fotoğraf."},
  "marble arch":             {hours:"24 saat",duration:"15 dk",entry:"Ücretsiz",tip:"Hyde Park girişinde. Oxford Street alışverişiyle birleştirilebilir."},
  "millennium bridge":       {hours:"24 saat",duration:"15–20 dk",entry:"Ücretsiz",tip:"Tate Modern ve St Paul's arasındaki yaya köprüsü. Yürüyüş güzel."},
  "albert memorial":         {hours:"Dışarıdan 24 saat",duration:"15 dk",entry:"Ücretsiz",tip:"Hyde Park'ta altın kaplama anıt. İç tur pazar günleri yapılıyor."},

/* normalize arama için */
function normalize(str){ return str.toLowerCase().replace(/['']/g,"'").trim(); }

function lookupPlace(){
  const name = normalize(document.getElementById('inp-name').value);
  const box = document.getElementById('info-box');

  // tam eşleşme
  let info = PLACES[name];

  // kısmi eşleşme
  if (!info) {
    const keys = Object.keys(PLACES);
    const found = keys.find(k => name.includes(k) || k.includes(name));
    if (found) info = PLACES[found];
  }

  box.style.display = 'block';
  if (info) {
    box.className = 'found';
    box.innerHTML = `
      ${info.hours?`<div class="ai-row"><span class="ai-label">🕐 Açılış saati</span><span class="ai-val">${info.hours}</span></div>`:''}
      ${info.duration?`<div class="ai-row"><span class="ai-label">⏱ Gezme süresi</span><span class="ai-val">${info.duration}</span></div>`:''}
      ${info.entry?`<div class="ai-row"><span class="ai-label">🎟 Giriş ücreti</span><span class="ai-val">${info.entry}</span></div>`:''}
      ${info.tip?`<div class="ai-row"><span class="ai-label">💡 İpucu</span><span class="ai-val" style="font-weight:400;font-size:11px">${info.tip}</span></div>`:''}`;
    currentInfo = info;
  } else {
    box.className = 'notfound';
    box.innerHTML = `<span>⚠️ Bu yer veritabanında yok. Bilgileri manuel girebilirsin.</span>`;
    currentInfo = null;
  }
}

/* ---- CATEGORIES ---- */
const DEFAULT_CATS = [
  {name:'Yemek',icon:'🍽',color:'#e05555'},
  {name:'Müzeler',icon:'🏛',color:'#2563eb'},
  {name:'Alışveriş',icon:'🛍',color:'#9333ea'},
  {name:'Etkinlik',icon:'🎭',color:'#ea580c'},
  {name:'Park',icon:'🌳',color:'#16a34a'},
];
let categories = [...DEFAULT_CATS];
let selCat = categories[0].name;

function getCat(name){ return categories.find(c=>c.name===name)||{name,icon:'📍',color:'#888'}; }

function renderCatSelector(){
  const el = document.getElementById('cat-selector');
  el.innerHTML = categories.map(c=>{
    const sel = c.name===selCat;
    return `<button class="cat-btn${sel?' sel':''}" onclick="selectCat('${c.name}')"
      style="${sel?'background:'+c.color+';':'border-color:'+c.color+';'}"
    >${c.icon} ${c.name}</button>`;
  }).join('');
}

function selectCat(name){ selCat=name; renderCatSelector(); }

function addNewCategory(){
  const inp = document.getElementById('new-cat-inp');
  const name = inp.value.trim();
  if(!name||categories.find(c=>c.name===name)) return;
  const icons=['⭐','🎯','🏖','🚂','🎨','🏰','🎵','🛕'];
  const colors=['#0891b2','#db2777','#b45309','#4338ca','#047857','#be123c','#7c3aed','#c2410c'];
  const idx = categories.length % icons.length;
  categories.push({name,icon:icons[idx],color:colors[idx]});
  selCat=name; inp.value=''; renderCatSelector();
}

/* ---- MAP ---- */
const map = L.map('map',{center:[51.505,-0.118],zoom:13});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:19}).addTo(map);

let pins=[], nextId=1, pendingLatLng=null, activeId=null, markers={}, currentInfo=null;
let collapsedCats=new Set();

map.on('click',e=>{
  pendingLatLng=e.latlng;
  const hint=document.getElementById('click-hint');
  hint.textContent='✅ Konum seçildi'; hint.classList.add('ready');
  switchTab('add');
  document.getElementById('inp-name').focus();
  clearTimeout(overlayTimer);
  document.getElementById('map-overlay').classList.add('hidden');
});

function onNameInput(){
  const name=document.getElementById('inp-name').value.trim();
  document.getElementById('btn-info').style.display=name.length>1?'block':'none';
  currentInfo=null;
  document.getElementById('info-box').style.display='none';
}

function makeIcon(color){
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <path d="M14 1C7.1 1 1.5 6.6 1.5 13.5c0 9.8 12.5 23 12.5 23s12.5-13.2 12.5-23C26.5 6.6 20.9 1 14 1z" fill="${color}" stroke="white" stroke-width="1.5"/>
    <circle cx="14" cy="13.5" r="5" fill="white" opacity="0.95"/>
  </svg>`;
  return L.divIcon({html:svg,className:'',iconSize:[28,38],iconAnchor:[14,38],popupAnchor:[0,-42]});
}

function gmapsUrl(pin){ return `https://www.google.com/maps/search/${encodeURIComponent(pin.name+' London')}/@${pin.lat},${pin.lng},17z`; }

function addMarker(pin){
  const cat=getCat(pin.category);
  const infoHtml=pin.info?`<div class="popup-info">
    ${pin.info.hours?`<span>🕐 ${pin.info.hours}</span>`:''}
    ${pin.info.duration?`<span>⏱ ${pin.info.duration}</span>`:''}
    ${pin.info.entry?`<span>🎟 ${pin.info.entry}</span>`:''}
  </div>`:'';
  const m=L.marker([pin.lat,pin.lng],{icon:makeIcon(cat.color)})
    .addTo(map)
    .bindPopup(`
      <div class="popup-name" style="color:${cat.color}">${cat.icon} ${pin.name}</div>
      ${pin.day?`<div class="popup-time">📅 ${pin.day}${pin.time?' · '+pin.time:''}</div>`:pin.time?`<div class="popup-time">🕐 ${pin.time}</div>`:''}
      ${pin.note?`<div class="popup-note">${pin.note}</div>`:''}
      ${infoHtml}
      <a class="popup-gmaps" href="${gmapsUrl(pin)}" target="_blank">🗺 Google Maps'te Aç ↗</a>
    `,{className:'custom-popup'});
  m.on('click',()=>setActive(pin.id));
  markers[pin.id]=m;
}

function savePin(){
  const name=document.getElementById('inp-name').value.trim();
  if(!name){document.getElementById('inp-name').focus();return;}
  if(!pendingLatLng){
    const hint=document.getElementById('click-hint');
    hint.textContent='👆 Önce haritada bir yere tıkla!'; hint.classList.remove('ready');
    return;
  }
  const pin={id:nextId++,name,lat:pendingLatLng.lat,lng:pendingLatLng.lng,
    category:selCat,time:document.getElementById('inp-time').value,
    day:document.getElementById('inp-day').value,
    note:document.getElementById('inp-note').value.trim(),
    info:currentInfo||null};
  pins.push(pin); addMarker(pin);
  pendingLatLng=null; currentInfo=null;
  document.getElementById('inp-name').value='';
  document.getElementById('inp-note').value='';
  document.getElementById('info-box').style.display='none';
  document.getElementById('btn-info').style.display='none';
  document.getElementById('click-hint').textContent='👆 Önce haritada bir yere tıkla';
  document.getElementById('click-hint').classList.remove('ready');
  saveToURL(); renderList(); switchTab('pins');
}

function deletePin(id){
  pins=pins.filter(p=>p.id!==id);
  if(markers[id]){map.removeLayer(markers[id]);delete markers[id];}
  if(activeId===id) activeId=null;
  saveToURL(); renderList();
}

function setActive(id){
  activeId=id; renderList();
  const pin=pins.find(p=>p.id===id);
  if(pin&&markers[id]){
    if(collapsedCats.has(pin.category)){collapsedCats.delete(pin.category);renderList();}
    map.setView([pin.lat,pin.lng],Math.max(map.getZoom(),16));
    markers[id].openPopup();
  }
}

function toggleCat(name){
  if(collapsedCats.has(name)) collapsedCats.delete(name); else collapsedCats.add(name);
  renderList();
}

function renderList(){
  const list=document.getElementById('pin-list');
  document.getElementById('cnt').textContent=pins.length;
  if(!pins.length){list.innerHTML='<div class="empty-hint">Henüz pin eklenmedi.\nHaritaya tıklayarak başla →</div>';updateSharePanel();return;}
  const days=['28 Mayıs','29 Mayıs','30 Mayıs','31 Mayıs','1 Haziran','2 Haziran','3 Haziran','4 Haziran','5 Haziran'];
  const byCat={};
  pins.forEach(p=>{if(!byCat[p.category])byCat[p.category]=[];byCat[p.category].push(p);});
  Object.values(byCat).forEach(arr=>arr.sort((a,b)=>{
    const da=days.indexOf(a.day),db=days.indexOf(b.day);
    if(da!==db)return da-db;
    if(a.time&&b.time)return a.time.localeCompare(b.time);
    return 0;
  }));
  const catOrder=categories.map(c=>c.name).filter(n=>byCat[n]);
  Object.keys(byCat).forEach(n=>{if(!catOrder.includes(n))catOrder.push(n);});
  list.innerHTML=catOrder.map(catName=>{
    const cat=getCat(catName),catPins=byCat[catName],isOpen=!collapsedCats.has(catName);
    return `<div class="cat-group">
      <div class="cat-header" onclick="toggleCat('${catName}')">
        <div class="cat-stripe" style="background:${cat.color}"></div>
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.name}</span>
        <span class="cat-count">${catPins.length}</span>
        <span class="cat-chevron ${isOpen?'open':''}">▶</span>
      </div>
      <div class="cat-pins ${isOpen?'open':''}">
        ${catPins.map(p=>`
          <div class="pcard ${activeId===p.id?'active':''}" onclick="setActive(${p.id})">
            <button class="pdel" onclick="event.stopPropagation();deletePin(${p.id})">✕</button>
            <div class="pcard-top">
              <div class="pdot" style="background:${cat.color}"></div>
              <span class="pname">${p.name}</span>
              ${p.time?`<span class="ptime">${p.time}</span>`:''}
            </div>
            ${p.day?`<div class="pday-badge">📅 ${p.day}</div>`:''}
            ${p.note?`<div class="pnote">${p.note}</div>`:''}
            ${p.info?`<div class="pinfo-preview">
              ${p.info.hours?`<span>🕐 ${p.info.hours} &nbsp;</span>`:''}
              ${p.info.duration?`<span>⏱ ${p.info.duration} &nbsp;</span>`:''}
              ${p.info.entry?`<span>🎟 ${p.info.entry}</span>`:''}
            </div>`:''}
            <a class="pgmaps" href="${gmapsUrl(p)}" target="_blank" onclick="event.stopPropagation()">🗺 Google Maps'te Aç ↗</a>
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');
  updateSharePanel();
}

function saveToURL(){
  try{
    const state={pins,cats:categories.filter(c=>!DEFAULT_CATS.find(d=>d.name===c.name))};
    history.replaceState(null,'',location.href.split('#')[0]+'#'+btoa(encodeURIComponent(JSON.stringify(state))));
  }catch(e){}
}

function loadFromURL(){
  const hash=location.hash.slice(1);
  if(!hash)return false;
  try{
    const state=JSON.parse(decodeURIComponent(atob(hash)));
    if(state.cats)state.cats.forEach(c=>{if(!categories.find(x=>x.name===c.name))categories.push(c);});
    const loaded=state.pins||state;
    loaded.forEach(p=>{p.id=nextId++;if(!p.category)p.category=categories[0].name;pins.push(p);addMarker(p);});
    if(pins.length)map.fitBounds(pins.map(p=>[p.lat,p.lng]),{padding:[40,40]});
    renderCatSelector();renderList();return true;
  }catch(e){return false;}
}

function updateSharePanel(){
  try{
    const state={pins,cats:categories.filter(c=>!DEFAULT_CATS.find(d=>d.name===c.name))};
    const url=pins.length?location.href.split('#')[0]+'#'+btoa(encodeURIComponent(JSON.stringify(state))):'';
    document.getElementById('share-url').textContent=url||'Henüz pin eklenmedi.';
    const summary=document.getElementById('pin-summary');
    if(!pins.length){summary.innerHTML='';return;}
    summary.innerHTML='<h3>Pinler ('+pins.length+')</h3>'+pins.map(p=>{
      const cat=getCat(p.category);
      return `<div class="summary-item">
        <div class="summary-dot" style="background:${cat.color}"></div>
        <span class="summary-name">${cat.icon} ${p.name}${p.day?` <small style="color:var(--muted)">${p.day}</small>`:''}</span>
        ${p.time?`<span class="summary-time">${p.time}</span>`:''}
      </div>`;
    }).join('');
  }catch(e){}
}

function copyLink(){
  const url=document.getElementById('share-url').textContent;
  if(!url||url==='Henüz pin eklenmedi.')return;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=document.getElementById('btn-copy');
    btn.textContent='✅ Kopyalandı!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 Linki Kopyala';btn.classList.remove('copied');},2500);
  });
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['pins','add','share'][i]===tab));
  document.getElementById('pin-list').style.display=tab==='pins'?'block':'none';
  document.getElementById('add-panel').style.display=tab==='add'?'block':'none';
  const sp=document.getElementById('share-panel');
  if(tab==='share'){sp.style.display='flex';updateSharePanel();}else sp.style.display='none';
}

let overlayTimer;
map.on('click',()=>{clearTimeout(overlayTimer);overlayTimer=setTimeout(()=>document.getElementById('map-overlay').classList.add('hidden'),3000);});

/* ---- SEARCH ---- */
let searchTimer=null,searchMarker=null;
document.getElementById('search-inp').addEventListener('input',function(){
  const q=this.value.trim();
  clearTimeout(searchTimer);
  if(q.length<2){document.getElementById('search-results').style.display='none';return;}
  searchTimer=setTimeout(()=>doSearch(q),500);
});
document.getElementById('search-inp').addEventListener('keydown',function(e){
  if(e.key==='Enter'){clearTimeout(searchTimer);doSearch(this.value.trim());}
});

async function doSearch(q){
  if(!q)return;
  const res=document.getElementById('search-results');
  res.style.display='block';
  res.innerHTML='<div class="search-item" style="color:#888;font-style:italic">Aranıyor...</div>';
  try{
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+' London')}&format=json&limit=5&countrycodes=gb&accept-language=tr`;
    const resp=await fetch(url);
    if(!resp.ok)throw new Error('err');
    const data=await resp.json();
    if(!data.length){res.innerHTML='<div class="search-item" style="color:#888">Sonuç bulunamadı</div>';return;}
    res.innerHTML=data.map(r=>{
      const parts=r.display_name.split(',');
      return `<div class="search-item" onclick="goToResult(${r.lat},${r.lon},${JSON.stringify(r.display_name)})">
        ${parts[0]}<small>${parts.slice(1,3).join(',').trim()}</small>
      </div>`;
    }).join('');
  }catch(e){res.innerHTML='<div class="search-item" style="color:#888">⚠️ Arama hatası, tekrar dene.</div>';}
}

function goToResult(lat,lon,displayName){
  const ll=[parseFloat(lat),parseFloat(lon)];
  map.setView(ll,17);
  if(searchMarker)map.removeLayer(searchMarker);
  searchMarker=L.circleMarker(ll,{radius:12,color:'#2563eb',fillColor:'#2563eb',fillOpacity:0.2,weight:2}).addTo(map);
  setTimeout(()=>{if(searchMarker){map.removeLayer(searchMarker);searchMarker=null;}},5000);
  document.getElementById('search-results').style.display='none';
  document.getElementById('search-inp').value=displayName.split(',')[0];
}

document.addEventListener('click',e=>{
  if(!document.getElementById('search-box').contains(e.target))
    document.getElementById('search-results').style.display='none';
});
