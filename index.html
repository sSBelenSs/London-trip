<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Londra Gezi Haritam</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f0;
  --surface: #ffffff;
  --surface2: #f8f8f5;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1a1a;
  --muted: #888;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --accent-border: #bfdbfe;
  --danger: #dc2626;
  --success: #16a34a;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --sidebar: 330px;
}
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; }
#layout { display: flex; height: 100vh; }

#sidebar {
  width: var(--sidebar); min-width: var(--sidebar);
  background: var(--surface); border-right: 1px solid var(--border2);
  display: flex; flex-direction: column; z-index: 100;
  box-shadow: 2px 0 12px rgba(0,0,0,0.06);
}
#header { padding: 18px 20px 14px; border-bottom: 1px solid var(--border); }
#header h1 { font-size: 17px; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; }
#header p { font-size: 12px; color: var(--muted); margin-top: 3px; }

#tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab {
  flex: 1; padding: 10px 0; font-size: 12px; font-weight: 500;
  text-align: center; color: var(--muted); cursor: pointer;
  border: none; border-bottom: 2px solid transparent;
  background: none; font-family: var(--font); transition: all 0.15s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); background: var(--surface2); }

#pin-list { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: thin; scrollbar-color: #ddd transparent; }
#pin-list:empty::after {
  content: 'Henüz pin eklenmedi.\nHaritaya tıklayarak başla →';
  display: block; text-align: center; color: var(--muted);
  font-size: 13px; padding: 32px 16px; white-space: pre-line; line-height: 1.7;
}

.pcard {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 11px 13px; margin-bottom: 7px;
  cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; position: relative;
}
.pcard:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
.pcard.active { border-color: var(--accent); background: var(--accent-bg); }
.pcard-top { display: flex; align-items: center; gap: 8px; }
.pdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pname { font-size: 13px; font-weight: 500; flex: 1; }
.ptime { font-size: 11px; font-family: var(--mono); color: var(--accent); background: var(--accent-bg); padding: 2px 6px; border-radius: 4px; }
.pnote { font-size: 11px; color: var(--muted); margin-top: 5px; padding-left: 18px; line-height: 1.5; }
.pday-badge { font-size: 10px; color: var(--muted); padding-left: 18px; margin-top: 3px; }
.pinfo-preview { font-size: 11px; color: #444; padding-left: 18px; margin-top: 6px; line-height: 1.8; border-top: 1px solid var(--border); padding-top: 6px; }
.pgmaps { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--accent); padding-left: 18px; margin-top: 5px; text-decoration: none; }
.pgmaps:hover { text-decoration: underline; }
.pdel {
  position: absolute; top: 9px; right: 9px; font-size: 11px; color: var(--danger);
  cursor: pointer; opacity: 0; transition: opacity 0.15s; background: none; border: none;
  font-family: var(--font); padding: 2px 5px;
}
.pcard:hover .pdel { opacity: 1; }

#add-panel { padding: 14px; border-top: 1px solid var(--border); background: var(--surface); overflow-y: auto; display: none; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
#click-hint {
  font-size: 12px; color: var(--accent); background: var(--accent-bg);
  border: 1px solid var(--accent-border); border-radius: 8px;
  padding: 8px 12px; margin-bottom: 10px; text-align: center;
}
#click-hint.ready { color: var(--success); background: #f0fdf4; border-color: #bbf7d0; }
.form-group { margin-bottom: 9px; }
.form-group label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; padding: 7px 10px; font-size: 13px; color: var(--text);
  font-family: var(--font); outline: none; transition: border-color 0.15s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--accent); }
.form-group textarea { height: 52px; resize: none; }
.row2 { display: flex; gap: 8px; }
.row2 .form-group { flex: 1; }
.colors { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.cb { width: 22px; height: 22px; border-radius: 50%; border: 2.5px solid transparent; cursor: pointer; transition: transform 0.1s; }
.cb:hover { transform: scale(1.15); }
.cb.sel { border-color: #1a1a1a; transform: scale(1.15); }

#ai-box {
  background: #fffbeb; border: 1px solid #fde68a;
  border-radius: 8px; padding: 10px 12px; margin-bottom: 10px;
  font-size: 12px; line-height: 1.8; display: none;
}
#ai-box .ai-row { display: flex; gap: 6px; }
#ai-box .ai-label { color: var(--muted); min-width: 95px; font-size: 11px; flex-shrink: 0; }
#ai-box .ai-val { color: var(--text); font-weight: 500; }

#btn-ai {
  width: 100%; padding: 8px; background: var(--surface2); color: var(--accent);
  border: 1px solid var(--accent-border); border-radius: 8px; font-size: 12px;
  font-weight: 500; cursor: pointer; font-family: var(--font);
  transition: all 0.15s; margin-bottom: 8px; display: none;
}
#btn-ai:hover { background: var(--accent-bg); }

#btn-save {
  width: 100%; padding: 10px; background: var(--accent); color: white;
  border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; font-family: var(--font); transition: all 0.15s;
}
#btn-save:hover { background: #1d4ed8; }
#btn-save:active { transform: scale(0.98); }

#share-panel { padding: 16px; display: none; flex-direction: column; gap: 12px; overflow-y: auto; flex: 1; }
.share-url-box { background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px; }
.share-url-box p { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.url-text { font-family: var(--mono); font-size: 10px; color: var(--accent); word-break: break-all; line-height: 1.5; max-height: 70px; overflow: auto; }
#btn-copy { width: 100%; padding: 9px; background: transparent; color: var(--accent); border: 1px solid var(--accent-border); border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--font); transition: all 0.15s; margin-top: 8px; }
#btn-copy:hover { background: var(--accent-bg); }
#btn-copy.copied { color: var(--success); border-color: #bbf7d0; }
.share-info { font-size: 12px; color: var(--muted); line-height: 1.6; }
.share-info strong { color: var(--text); }
.pin-summary { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
.pin-summary h3 { font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.summary-item:last-child { border-bottom: none; }
.summary-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.summary-name { font-size: 12px; flex: 1; }
.summary-time { font-size: 11px; font-family: var(--mono); color: var(--accent); }

#map { flex: 1; z-index: 1; }
#search-box {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  z-index: 500; width: 320px;
}
#search-inp {
  width: 100%; padding: 10px 16px; border-radius: 24px;
  border: none; box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  font-size: 14px; font-family: var(--font); outline: none;
  background: white; color: var(--text);
}
#search-results {
  background: white; border-radius: 12px; margin-top: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15); overflow: hidden; display: none;
}
.search-item {
  padding: 10px 16px; font-size: 13px; cursor: pointer;
  border-bottom: 1px solid #f0f0f0; color: var(--text);
}
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: var(--accent-bg); color: var(--accent); }
.search-item small { display: block; font-size: 11px; color: var(--muted); margin-top: 1px; }
#map-overlay {
  position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.92); backdrop-filter: blur(8px);
  border: 1px solid rgba(0,0,0,0.12); border-radius: 20px;
  padding: 7px 18px; font-size: 12px; color: #555; z-index: 500;
  pointer-events: none; transition: opacity 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
#map-overlay.hidden { opacity: 0; }

.leaflet-container { background: #e8e0d8; font-family: var(--font); }
.custom-popup .leaflet-popup-content-wrapper {
  background: white; border: 1px solid rgba(0,0,0,0.1);
  border-radius: var(--radius); box-shadow: 0 8px 24px rgba(0,0,0,0.12); color: var(--text);
}
.custom-popup .leaflet-popup-tip { background: white; }
.custom-popup .leaflet-popup-content { margin: 14px 16px; min-width: 190px; }
.popup-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.popup-time { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
.popup-note { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 6px; }
.popup-info { font-size: 11px; line-height: 1.9; border-top: 1px solid #eee; padding-top: 6px; margin-top: 4px; }
.popup-gmaps { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); text-decoration: none; margin-top: 8px; font-weight: 500; }
.popup-gmaps:hover { text-decoration: underline; }

.counter { display: inline-block; background: var(--accent-bg); color: var(--accent); border-radius: 10px; font-size: 11px; padding: 1px 7px; margin-left: 5px; }

@media (max-width: 640px) {
  :root { --sidebar: 100vw; }
  #layout { flex-direction: column; }
  #sidebar { height: 55vh; min-width: unset; width: 100%; }
  #map { height: 45vh; }
}
</style>
</head>
<body>
<div id="layout">
  <div id="sidebar">
    <div id="header">
      <h1>✈ Londra Gezi Haritam</h1>
      <p>28 Mayıs – 5 Haziran 2026</p>
    </div>
    <div id="tabs">
      <button class="tab active" onclick="switchTab('pins')">📍 Pinler <span class="counter" id="cnt">0</span></button>
      <button class="tab" onclick="switchTab('add')">＋ Ekle</button>
      <button class="tab" onclick="switchTab('share')">🔗 Paylaş</button>
    </div>

    <div id="pin-list"></div>

    <div id="add-panel">
      <div class="section-label">Yeni Pin Ekle</div>
      <div id="click-hint">👆 Önce haritada bir yere tıkla</div>
      <div class="form-group">
        <label>Yer adı</label>
        <input type="text" id="inp-name" placeholder="örn: Tower Bridge" maxlength="60"
          oninput="onNameInput()" onblur="onNameBlur()"/>
      </div>
      <button id="btn-ai" onclick="fetchPlaceInfo()">✨ Bilgileri Otomatik Getir</button>
      <div id="ai-box"></div>
      <div class="row2">
        <div class="form-group">
          <label>Saat</label>
          <input type="time" id="inp-time" value="10:00"/>
        </div>
        <div class="form-group">
          <label>Gün</label>
          <select id="inp-day">
            <option value="">—</option>
            <option>28 Mayıs</option><option>29 Mayıs</option><option>30 Mayıs</option>
            <option>31 Mayıs</option><option>1 Haziran</option><option>2 Haziran</option>
            <option>3 Haziran</option><option>4 Haziran</option><option>5 Haziran</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Renk</label>
        <div class="colors" id="colors"></div>
      </div>
      <div class="form-group">
        <label>Not</label>
        <textarea id="inp-note" placeholder="Hatırlatmalar, öneriler..."></textarea>
      </div>
      <button id="btn-save" onclick="savePin()">📌 Haritaya Ekle</button>
    </div>

    <div id="share-panel">
      <p class="share-info">Tüm pinlerin <strong>link içine kodlanır</strong> — sunucu yok, hesap yok. Linki paylaştığın herkes haritanı görür.</p>
      <div class="share-url-box">
        <p>Paylaşım linki:</p>
        <div class="url-text" id="share-url">Henüz pin eklenmedi.</div>
        <button id="btn-copy" onclick="copyLink()">📋 Linki Kopyala</button>
      </div>
      <div class="pin-summary" id="pin-summary"></div>
    </div>
  </div>

  <div id="map" style="position:relative;">
    <div id="search-box">
      <input type="text" id="search-inp" placeholder="🔍 Londra'da yer ara..." onkeydown="if(event.key==='Enter')doSearch()" oninput="onSearchInput()"/>
      <div id="search-results"></div>
    </div>
    <div id="map-overlay">🖱 Haritaya tıklayarak pin ekle</div>
  </div>
</div>

<script>
const COLORS = ['#E05555','#2563eb','#16a34a','#d97706','#9333ea','#ea580c','#0891b2','#db2777'];
let selColor = COLORS[0];
let pins = [], nextId = 1, pendingLatLng = null, activeId = null, markers = {}, currentAIInfo = null;

const colorsEl = document.getElementById('colors');
COLORS.forEach(c => {
  const b = document.createElement('div');
  b.className = 'cb' + (c === selColor ? ' sel' : '');
  b.style.background = c;
  b.onclick = () => { selColor = c; document.querySelectorAll('.cb').forEach(x => x.classList.remove('sel')); b.classList.add('sel'); };
  colorsEl.appendChild(b);
});

const map = L.map('map', { center: [51.505, -0.118], zoom: 13 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 19
}).addTo(map);

map.on('click', e => {
  pendingLatLng = e.latlng;
  const hint = document.getElementById('click-hint');
  hint.textContent = '✅ Konum seçildi';
  hint.classList.add('ready');
  switchTab('add');
  document.getElementById('inp-name').focus();
});

function onNameInput() {
  const name = document.getElementById('inp-name').value.trim();
  document.getElementById('btn-ai').style.display = name.length > 2 ? 'block' : 'none';
  currentAIInfo = null;
  document.getElementById('ai-box').style.display = 'none';
}

function onNameBlur() {
  const name = document.getElementById('inp-name').value.trim();
  if (name.length > 2) setTimeout(fetchPlaceInfo, 400);
}

async function fetchPlaceInfo() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) return;
  const box = document.getElementById('ai-box');
  box.style.display = 'block';
  box.innerHTML = '<span style="color:#888;font-style:italic">✨ Bilgiler yükleniyor...</span>';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        system: 'You are a London travel assistant. When given a place name in London, respond ONLY with a JSON object (no markdown, no extra text) with these exact keys: "hours" (opening-closing hours e.g. "09:00–18:00" or "24 saat açık"), "duration" (average visit time in Turkish e.g. "1–2 saat"), "entry" (entry fee in Turkish e.g. "Ücretsiz" or "£25–£35"), "tip" (one short practical tip in Turkish, max 12 words). Give best estimates even if unsure.',
        messages: [{ role: 'user', content: `London place: ${name}` }]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || '';
    let info;
    try { info = JSON.parse(text.replace(/```json|```/g,'').trim()); } catch { info = null; }

    if (info) {
      currentAIInfo = info;
      box.innerHTML = `
        ${info.hours ? `<div class="ai-row"><span class="ai-label">🕐 Açılış saati</span><span class="ai-val">${info.hours}</span></div>` : ''}
        ${info.duration ? `<div class="ai-row"><span class="ai-label">⏱ Gezme süresi</span><span class="ai-val">${info.duration}</span></div>` : ''}
        ${info.entry ? `<div class="ai-row"><span class="ai-label">🎟 Giriş ücreti</span><span class="ai-val">${info.entry}</span></div>` : ''}
        ${info.tip ? `<div class="ai-row" style="margin-top:3px"><span class="ai-label">💡 İpucu</span><span class="ai-val" style="font-weight:400;font-size:11px">${info.tip}</span></div>` : ''}
      `;
    } else {
      box.innerHTML = '<span style="color:#888">⚠️ Bilgi alınamadı, manuel girebilirsin.</span>';
    }
  } catch(e) {
    box.innerHTML = '<span style="color:#888">⚠️ Bağlantı hatası.</span>';
  }
}

function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <path d="M14 1C7.1 1 1.5 6.6 1.5 13.5c0 9.8 12.5 23 12.5 23s12.5-13.2 12.5-23C26.5 6.6 20.9 1 14 1z" fill="${color}" stroke="white" stroke-width="1.5"/>
    <circle cx="14" cy="13.5" r="5" fill="white" opacity="0.95"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [28,38], iconAnchor: [14,38], popupAnchor: [0,-42] });
}

function gmapsUrl(pin) {
  return `https://www.google.com/maps/search/${encodeURIComponent(pin.name + ' London')}/@${pin.lat},${pin.lng},17z`;
}

function addMarker(pin) {
  const infoHtml = pin.info ? `<div class="popup-info">
    ${pin.info.hours ? `<span>🕐 ${pin.info.hours}</span>` : ''}
    ${pin.info.duration ? `<span>⏱ ${pin.info.duration}</span>` : ''}
    ${pin.info.entry ? `<span>🎟 ${pin.info.entry}</span>` : ''}
  </div>` : '';
  const m = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.color) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-name" style="color:${pin.color}">${pin.name}</div>
      ${pin.day ? `<div class="popup-time">📅 ${pin.day}${pin.time ? ' · '+pin.time : ''}</div>` : pin.time ? `<div class="popup-time">🕐 ${pin.time}</div>` : ''}
      ${pin.note ? `<div class="popup-note">${pin.note}</div>` : ''}
      ${infoHtml}
      <a class="popup-gmaps" href="${gmapsUrl(pin)}" target="_blank">🗺 Google Maps'te Aç ↗</a>
    `, { className: 'custom-popup' });
  m.on('click', () => setActive(pin.id));
  markers[pin.id] = m;
}

function savePin() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  if (!pendingLatLng) {
    const hint = document.getElementById('click-hint');
    hint.textContent = '👆 Önce haritada bir yere tıkla!';
    hint.classList.remove('ready');
    return;
  }
  const pin = {
    id: nextId++, name,
    lat: pendingLatLng.lat, lng: pendingLatLng.lng,
    time: document.getElementById('inp-time').value,
    day: document.getElementById('inp-day').value,
    note: document.getElementById('inp-note').value.trim(),
    color: selColor,
    info: currentAIInfo || null
  };
  pins.push(pin); addMarker(pin);
  pendingLatLng = null; currentAIInfo = null;
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('ai-box').style.display = 'none';
  document.getElementById('btn-ai').style.display = 'none';
  document.getElementById('click-hint').textContent = '👆 Önce haritada bir yere tıkla';
  document.getElementById('click-hint').classList.remove('ready');
  saveToURL(); renderList(); switchTab('pins');
}

function deletePin(id) {
  pins = pins.filter(p => p.id !== id);
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  if (activeId === id) activeId = null;
  saveToURL(); renderList();
}

function setActive(id) {
  activeId = id; renderList();
  const pin = pins.find(p => p.id === id);
  if (pin && markers[id]) { map.setView([pin.lat, pin.lng], Math.max(map.getZoom(), 16)); markers[id].openPopup(); }
}

function renderList() {
  const list = document.getElementById('pin-list');
  document.getElementById('cnt').textContent = pins.length;
  if (!pins.length) { list.innerHTML = ''; return; }
  const days = ['25 Mayıs','26 Mayıs','27 Mayıs','28 Mayıs','29 Mayıs','30 Mayıs','31 Mayıs','1 Haziran','2 Haziran'];
  const sorted = [...pins].sort((a,b) => {
    const da = days.indexOf(a.day), db = days.indexOf(b.day);
    if (da !== db) return da - db;
    if (a.time && b.time) return a.time.localeCompare(b.time);
    return 0;
  });
  list.innerHTML = sorted.map(p => `
    <div class="pcard ${activeId===p.id?'active':''}" onclick="setActive(${p.id})">
      <button class="pdel" onclick="event.stopPropagation();deletePin(${p.id})">✕</button>
      <div class="pcard-top">
        <div class="pdot" style="background:${p.color}"></div>
        <span class="pname">${p.name}</span>
        ${p.time?`<span class="ptime">${p.time}</span>`:''}
      </div>
      ${p.day?`<div class="pday-badge">📅 ${p.day}</div>`:''}
      ${p.note?`<div class="pnote">${p.note}</div>`:''}
      ${p.info?`<div class="pinfo-preview">
        ${p.info.hours?`<span>🕐 ${p.info.hours}</span> `:''}
        ${p.info.duration?`<span>⏱ ${p.info.duration}</span> `:''}
        ${p.info.entry?`<span>🎟 ${p.info.entry}</span>`:''}
      </div>`:''}
      <a class="pgmaps" href="${gmapsUrl(p)}" target="_blank" onclick="event.stopPropagation()">🗺 Google Maps'te Aç ↗</a>
    </div>
  `).join('');
  updateSharePanel();
}

function saveToURL() {
  try {
    const data = btoa(encodeURIComponent(JSON.stringify(pins)));
    history.replaceState(null, '', window.location.href.split('#')[0] + '#' + data);
  } catch(e) {}
}

function loadFromURL() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const loaded = JSON.parse(decodeURIComponent(atob(hash)));
    loaded.forEach(p => { p.id = nextId++; pins.push(p); addMarker(p); });
    if (pins.length) map.fitBounds(pins.map(p => [p.lat,p.lng]), { padding: [40,40] });
    renderList();
  } catch(e) {}
}

function updateSharePanel() {
  const url = pins.length ? window.location.href.split('#')[0]+'#'+btoa(encodeURIComponent(JSON.stringify(pins))) : '';
  document.getElementById('share-url').textContent = url || 'Henüz pin eklenmedi.';
  const summary = document.getElementById('pin-summary');
  if (!pins.length) { summary.innerHTML = ''; return; }
  summary.innerHTML = '<h3>Pinler ('+pins.length+')</h3>' +
    pins.map(p=>`<div class="summary-item">
      <div class="summary-dot" style="background:${p.color}"></div>
      <span class="summary-name">${p.name}${p.day?` <small style="color:var(--muted)">${p.day}</small>`:''}</span>
      ${p.time?`<span class="summary-time">${p.time}</span>`:''}
    </div>`).join('');
}

function copyLink() {
  const url = document.getElementById('share-url').textContent;
  if (!url || url==='Henüz pin eklenmedi.') return;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✅ Kopyalandı!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Linki Kopyala'; btn.classList.remove('copied'); }, 2500);
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['pins','add','share'][i]===tab));
  document.getElementById('pin-list').style.display = tab==='pins' ? 'block' : 'none';
  document.getElementById('add-panel').style.display = tab==='add' ? 'block' : 'none';
  const sp = document.getElementById('share-panel');
  if (tab==='share') { sp.style.display='flex'; updateSharePanel(); } else sp.style.display='none';
}

let overlayTimer;
map.on('click', () => {
  clearTimeout(overlayTimer);
  overlayTimer = setTimeout(() => document.getElementById('map-overlay').classList.add('hidden'), 3000);
});

function loadDemo() {
  const demo = [
    { id:nextId++, name:'Big Ben', lat:51.5007, lng:-0.1246, time:'09:00', day:'28 Mayıs', note:'Sabah erken git, kalabalık az olur', color:'#2563eb', info:{ hours:'09:00–18:00', duration:'30–60 dk', entry:'Ücretsiz (dış)', tip:'Westminster Köprüsü\'nden fotoğraf çekilmesi önerilir.' }},
    { id:nextId++, name:'Tower Bridge', lat:51.5055, lng:-0.0754, time:'11:30', day:'28 Mayıs', note:'Cam zemin için bilet al', color:'#E05555', info:{ hours:'09:30–18:00', duration:'1–1.5 saat', entry:'£14.80', tip:'Cam zemin 42 metre yükseklikte.' }},
    { id:nextId++, name:'British Museum', lat:51.5194, lng:-0.1270, time:'14:00', day:'29 Mayıs', note:'Rosetta Taşı mutlaka görülmeli', color:'#16a34a', info:{ hours:'10:00–17:00', duration:'2–3 saat', entry:'Ücretsiz', tip:'Cuma günleri 20:30\'a kadar açık.' }},
  ];
  demo.forEach(p => { pins.push(p); addMarker(p); });
  map.fitBounds([[51.50,-0.13],[51.52,-0.07]], { padding:[40,40] });
  saveToURL(); renderList();
}

switchTab('pins');
if (window.location.hash.length > 1) loadFromURL(); else loadDemo();

let searchTimer;
let searchMarker = null;

function onSearchInput() {
  const q = document.getElementById('search-inp').value.trim();
  clearTimeout(searchTimer);
  if (q.length < 3) { document.getElementById('search-results').style.display='none'; return; }
  searchTimer = setTimeout(() => doSearch(), 600);
}

async function doSearch() {
  const q = document.getElementById('search-inp').value.trim();
  if (!q) return;
  const res = document.getElementById('search-results');
  res.style.display = 'block';
  res.innerHTML = '<div class="search-item" style="color:#888;font-style:italic">Aranıyor...</div>';
  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q + ' London')}&format=json&limit=5&countrycodes=gb`;
    const resp = await fetch(url, { headers: { 'Accept-Language': 'tr' } });
    const data = await resp.json();
    if (!data.length) { res.innerHTML = '<div class="search-item" style="color:#888">Sonuç bulunamadı</div>'; return; }
    res.innerHTML = data.map((r,i) => `
      <div class="search-item" onclick="goToResult(${r.lat},${r.lon},'${r.display_name.replace(/'/g,"\\'")}')">
        ${r.display_name.split(',')[0]}
        <small>${r.display_name.split(',').slice(1,3).join(',').trim()}</small>
      </div>`).join('');
  } catch(e) {
    res.innerHTML = '<div class="search-item" style="color:#888">Bağlantı hatası</div>';
  }
}

function goToResult(lat, lon, name) {
  const ll = [parseFloat(lat), parseFloat(lon)];
  map.setView(ll, 17);
  if (searchMarker) map.removeLayer(searchMarker);
  searchMarker = L.circleMarker(ll, { radius:10, color:'#2563eb', fillColor:'#2563eb', fillOpacity:0.3, weight:2 }).addTo(map);
  setTimeout(() => { if(searchMarker) { map.removeLayer(searchMarker); searchMarker=null; } }, 4000);
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('search-inp').value = name.split(',')[0];
}

document.addEventListener('click', e => {
  if (!document.getElementById('search-box').contains(e.target)) {
    document.getElementById('search-results').style.display = 'none';
  }
});
</script>
</body>
