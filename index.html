<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Londra Gezi Haritam</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #222222;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0ede8;
  --muted: #888;
  --accent: #c8a96e;
  --accent2: #e8c98e;
  --danger: #e05555;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --sidebar: 320px;
}
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); overflow: hidden; }
#layout { display: flex; height: 100vh; }

/* SIDEBAR */
#sidebar {
  width: var(--sidebar);
  min-width: var(--sidebar);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 100;
  position: relative;
}
#header {
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
}
#header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.3px;
}
#header p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}

/* TABS */
#tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 11px 0;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  font-family: var(--font);
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

/* PIN LIST */
#pin-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  scrollbar-width: thin;
  scrollbar-color: var(--border2) transparent;
}
#pin-list:empty::after {
  content: 'Henüz pin eklenmedi.\nHaritaya tıklayarak başla →';
  display: block;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 32px 16px;
  white-space: pre-line;
  line-height: 1.7;
}
.pcard {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.1s;
  position: relative;
}
.pcard:hover { border-color: var(--border2); transform: translateX(2px); }
.pcard.active { border-color: var(--accent); }
.pcard-top { display: flex; align-items: center; gap: 9px; }
.pdot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.pname { font-size: 13px; font-weight: 500; flex: 1; color: var(--text); }
.ptime {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--accent);
  background: rgba(200,169,110,0.12);
  padding: 2px 6px;
  border-radius: 4px;
}
.pnote { font-size: 11px; color: var(--muted); margin-top: 6px; padding-left: 19px; line-height: 1.5; }
.pdel {
  position: absolute;
  top: 10px; right: 10px;
  font-size: 11px;
  color: var(--danger);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.15s;
  background: none;
  border: none;
  font-family: var(--font);
  padding: 2px 5px;
}
.pcard:hover .pdel { opacity: 1; }
.pday-badge {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--muted);
  padding-left: 19px;
  margin-top: 4px;
}

/* ADD FORM */
#add-panel {
  padding: 16px;
  border-top: 1px solid var(--border);
  background: var(--surface);
}
#add-panel .section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}
#click-hint {
  font-size: 12px;
  color: var(--accent);
  background: rgba(200,169,110,0.1);
  border: 1px solid rgba(200,169,110,0.2);
  border-radius: 8px;
  padding: 9px 12px;
  margin-bottom: 12px;
  text-align: center;
}
#click-hint.ready { color: #6ec88a; background: rgba(110,200,138,0.1); border-color: rgba(110,200,138,0.2); }
.form-group { margin-bottom: 10px; }
.form-group label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; }
.form-group input, .form-group textarea, .form-group select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 8px 10px;
  font-size: 13px;
  color: var(--text);
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  border-color: var(--accent);
}
.form-group textarea { height: 60px; resize: none; }
.form-group select option { background: #222; }
.row2 { display: flex; gap: 8px; }
.row2 .form-group { flex: 1; }
.colors { display: flex; gap: 6px; margin-bottom: 12px; }
.cb {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.1s, border-color 0.1s;
}
.cb:hover { transform: scale(1.15); }
.cb.sel { border-color: white; transform: scale(1.15); }
#btn-save {
  width: 100%;
  padding: 10px;
  background: var(--accent);
  color: #1a1400;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  font-family: var(--font);
  transition: background 0.15s, transform 0.1s;
}
#btn-save:hover { background: var(--accent2); }
#btn-save:active { transform: scale(0.98); }

/* SHARE PANEL */
#share-panel { padding: 16px; display: none; flex-direction: column; gap: 12px; overflow-y: auto; flex: 1; }
#share-panel.visible { display: flex; }
.share-url-box {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 12px;
}
.share-url-box p { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.url-text {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
  word-break: break-all;
  line-height: 1.5;
  max-height: 80px;
  overflow: auto;
}
#btn-copy {
  width: 100%;
  padding: 10px;
  background: transparent;
  color: var(--accent);
  border: 1px solid rgba(200,169,110,0.3);
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: all 0.15s;
  margin-top: 8px;
}
#btn-copy:hover { background: rgba(200,169,110,0.1); }
#btn-copy.copied { color: #6ec88a; border-color: rgba(110,200,138,0.3); }
.share-info { font-size: 12px; color: var(--muted); line-height: 1.6; }
.share-info strong { color: var(--text); }
.pin-summary {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
}
.pin-summary h3 { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); }
.summary-item:last-child { border-bottom: none; }
.summary-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.summary-name { font-size: 12px; flex: 1; }
.summary-time { font-size: 11px; font-family: var(--mono); color: var(--accent); }

/* MAP */
#map { flex: 1; z-index: 1; }
#map-overlay {
  position: absolute;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15,15,15,0.85);
  backdrop-filter: blur(8px);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 8px 18px;
  font-size: 12px;
  color: var(--muted);
  z-index: 500;
  pointer-events: none;
  transition: opacity 0.3s;
}
#map-overlay.hidden { opacity: 0; }

/* Leaflet overrides */
.leaflet-container { background: #1a1f1a; font-family: var(--font); }
.custom-popup .leaflet-popup-content-wrapper {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  color: var(--text);
}
.custom-popup .leaflet-popup-tip { background: var(--surface); }
.custom-popup .leaflet-popup-content { margin: 14px 16px; min-width: 160px; }
.popup-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.popup-time { font-size: 12px; font-family: var(--mono); color: var(--accent); margin-bottom: 4px; }
.popup-note { font-size: 12px; color: var(--muted); line-height: 1.5; }

.counter {
  display: inline-block;
  background: rgba(200,169,110,0.15);
  color: var(--accent);
  border-radius: 10px;
  font-size: 11px;
  font-family: var(--mono);
  padding: 1px 7px;
  margin-left: 6px;
}

@media (max-width: 640px) {
  :root { --sidebar: 100vw; }
  #layout { flex-direction: column; }
  #sidebar { height: 50vh; min-width: unset; width: 100%; }
  #map { height: 50vh; }
}
</style>
</head>
<body>
<div id="layout">
  <div id="sidebar">
    <div id="header">
      <h1>✈ Londra Gezi Haritam</h1>
      <p id="subtitle">25 Mayıs – 2 Haziran</p>
    </div>
    <div id="tabs">
      <button class="tab active" onclick="switchTab('pins')">📍 Pinler <span class="counter" id="cnt">0</span></button>
      <button class="tab" onclick="switchTab('add')">＋ Ekle</button>
      <button class="tab" onclick="switchTab('share')">🔗 Paylaş</button>
    </div>

    <div id="pin-list"></div>

    <div id="add-panel">
      <div class="section-label">Yeni Pin Ekle</div>
      <div id="click-hint">👆 Önce haritada bir yere tıkla</div>
      <div class="form-group">
        <label>Yer adı</label>
        <input type="text" id="inp-name" placeholder="örn: Tower Bridge" maxlength="50"/>
      </div>
      <div class="row2">
        <div class="form-group">
          <label>Saat</label>
          <input type="time" id="inp-time" value="10:00"/>
        </div>
        <div class="form-group">
          <label>Gün</label>
          <select id="inp-day">
            <option value="">—</option>
            <option value="25 Mayıs">25 Mayıs</option>
            <option value="26 Mayıs">26 Mayıs</option>
            <option value="27 Mayıs">27 Mayıs</option>
            <option value="28 Mayıs">28 Mayıs</option>
            <option value="29 Mayıs">29 Mayıs</option>
            <option value="30 Mayıs">30 Mayıs</option>
            <option value="31 Mayıs">31 Mayıs</option>
            <option value="1 Haziran">1 Haziran</option>
            <option value="2 Haziran">2 Haziran</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Renk</label>
        <div class="colors" id="colors"></div>
      </div>
      <div class="form-group">
        <label>Not</label>
        <textarea id="inp-note" placeholder="Hatırlatmalar, öneriler..."></textarea>
      </div>
      <button id="btn-save" onclick="savePin()">📌 Haritaya Ekle</button>
    </div>

    <div id="share-panel">
      <p class="share-info">Tüm pinlerin <strong>link içine kodlanır</strong> — sunucu yok, hesap yok. Linki paylaştığın herkes haritanı görür.</p>
      <div class="share-url-box">
        <p>Paylaşım linki:</p>
        <div class="url-text" id="share-url">Henüz pin eklenmedi.</div>
        <button id="btn-copy" onclick="copyLink()">📋 Linki Kopyala</button>
      </div>
      <div class="pin-summary" id="pin-summary"></div>
    </div>
  </div>

  <div id="map" style="position:relative;">
    <div id="map-overlay">🖱 Haritaya tıklayarak pin ekle</div>
  </div>
</div>

<script>
const COLORS = ['#E05555','#4A90D9','#27AE60','#F0A500','#9B59B6','#E67E22','#1ABC9C','#E91E8C'];
let selColor = COLORS[0];
let pins = [];
let nextId = 1;
let pendingLatLng = null;
let activeId = null;
let markers = {};
let activeTab = 'pins';

/* ---- COLOR BUTTONS ---- */
const colorsEl = document.getElementById('colors');
COLORS.forEach(c => {
  const b = document.createElement('div');
  b.className = 'cb' + (c === selColor ? ' sel' : '');
  b.style.background = c;
  b.title = c;
  b.onclick = () => {
    selColor = c;
    document.querySelectorAll('.cb').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
  };
  colorsEl.appendChild(b);
});

/* ---- MAP INIT ---- */
const map = L.map('map', {
  center: [51.505, -0.118],
  zoom: 13,
  zoomControl: true
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19
}).addTo(map);

map.on('click', e => {
  pendingLatLng = e.latlng;
  const hint = document.getElementById('click-hint');
  hint.textContent = `✅ ${e.latlng.lat.toFixed(4)}, ${e.latlng.lng.toFixed(4)} seçildi`;
  hint.classList.add('ready');
  switchTab('add');
  document.getElementById('inp-name').focus();
});

/* ---- CUSTOM MARKER ---- */
function makeIcon(color) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="38" viewBox="0 0 28 38">
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.4"/></filter>
    <path filter="url(#s)" d="M14 1C7.1 1 1.5 6.6 1.5 13.5c0 9.8 12.5 23 12.5 23s12.5-13.2 12.5-23C26.5 6.6 20.9 1 14 1z" fill="${color}"/>
    <circle cx="14" cy="13.5" r="5.5" fill="white" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [28, 38],
    iconAnchor: [14, 38],
    popupAnchor: [0, -40]
  });
}

/* ---- SAVE PIN ---- */
function savePin() {
  const name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  if (!pendingLatLng) {
    document.getElementById('click-hint').textContent = '👆 Önce haritada bir yere tıkla!';
    document.getElementById('click-hint').classList.remove('ready');
    return;
  }
  const pin = {
    id: nextId++,
    name,
    lat: pendingLatLng.lat,
    lng: pendingLatLng.lng,
    time: document.getElementById('inp-time').value,
    day: document.getElementById('inp-day').value,
    note: document.getElementById('inp-note').value.trim(),
    color: selColor
  };
  pins.push(pin);
  addMarker(pin);
  pendingLatLng = null;
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-note').value = '';
  document.getElementById('click-hint').textContent = '👆 Önce haritada bir yere tıkla';
  document.getElementById('click-hint').classList.remove('ready');
  saveToURL();
  renderList();
  switchTab('pins');
}

function addMarker(pin) {
  const m = L.marker([pin.lat, pin.lng], { icon: makeIcon(pin.color) })
    .addTo(map)
    .bindPopup(`
      <div class="popup-name" style="color:${pin.color}">${pin.name}</div>
      ${pin.day ? `<div class="popup-time">📅 ${pin.day}${pin.time ? ' · ' + pin.time : ''}</div>` : pin.time ? `<div class="popup-time">🕐 ${pin.time}</div>` : ''}
      ${pin.note ? `<div class="popup-note">${pin.note}</div>` : ''}
    `, { className: 'custom-popup' });
  m.on('click', () => setActive(pin.id));
  markers[pin.id] = m;
}

/* ---- DELETE ---- */
function deletePin(id) {
  pins = pins.filter(p => p.id !== id);
  if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
  if (activeId === id) activeId = null;
  saveToURL();
  renderList();
}

/* ---- ACTIVE ---- */
function setActive(id) {
  activeId = id;
  renderList();
  const pin = pins.find(p => p.id === id);
  if (pin && markers[id]) {
    map.setView([pin.lat, pin.lng], Math.max(map.getZoom(), 15));
    markers[id].openPopup();
  }
}

/* ---- RENDER LIST ---- */
function renderList() {
  const list = document.getElementById('pin-list');
  document.getElementById('cnt').textContent = pins.length;

  if (!pins.length) { list.innerHTML = ''; return; }

  const sorted = [...pins].sort((a, b) => {
    if (a.day && b.day && a.day !== b.day) return a.day.localeCompare(b.day);
    if (a.time && b.time) return a.time.localeCompare(b.time);
    return 0;
  });

  list.innerHTML = sorted.map(p => `
    <div class="pcard ${activeId === p.id ? 'active' : ''}" onclick="setActive(${p.id})">
      <button class="pdel" onclick="event.stopPropagation();deletePin(${p.id})">✕</button>
      <div class="pcard-top">
        <div class="pdot" style="background:${p.color}"></div>
        <span class="pname">${p.name}</span>
        ${p.time ? `<span class="ptime">${p.time}</span>` : ''}
      </div>
      ${p.day ? `<div class="pday-badge">📅 ${p.day}</div>` : ''}
      ${p.note ? `<div class="pnote">${p.note}</div>` : ''}
    </div>
  `).join('');

  updateSharePanel();
}

/* ---- SHARE / URL ---- */
function saveToURL() {
  const data = btoa(encodeURIComponent(JSON.stringify(pins)));
  const url = window.location.href.split('?')[0].split('#')[0] + '#' + data;
  history.replaceState(null, '', url);
}

function loadFromURL() {
  const hash = window.location.hash.slice(1);
  if (!hash) return;
  try {
    const loaded = JSON.parse(decodeURIComponent(atob(hash)));
    loaded.forEach(p => {
      p.id = nextId++;
      pins.push(p);
      addMarker(p);
    });
    if (pins.length) {
      const latlngs = pins.map(p => [p.lat, p.lng]);
      map.fitBounds(latlngs, { padding: [40, 40] });
    }
    renderList();
  } catch(e) { console.warn('URL parse error', e); }
}

function updateSharePanel() {
  const data = pins.length ? btoa(encodeURIComponent(JSON.stringify(pins))) : '';
  const url = pins.length ? (window.location.href.split('#')[0] + '#' + data) : '';
  document.getElementById('share-url').textContent = url || 'Henüz pin eklenmedi.';

  const summary = document.getElementById('pin-summary');
  if (!pins.length) { summary.innerHTML = ''; return; }
  summary.innerHTML = '<h3>Pinler (' + pins.length + ')</h3>' +
    pins.map(p => `<div class="summary-item">
      <div class="summary-dot" style="background:${p.color}"></div>
      <span class="summary-name">${p.name}${p.day ? ' <small style="color:var(--muted)">'+p.day+'</small>' : ''}</span>
      ${p.time ? `<span class="summary-time">${p.time}</span>` : ''}
    </div>`).join('');
}

function copyLink() {
  const url = document.getElementById('share-url').textContent;
  if (!url || url === 'Henüz pin eklenmedi.') return;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✅ Kopyalandı!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋 Linki Kopyala'; btn.classList.remove('copied'); }, 2500);
  });
}

/* ---- TABS ---- */
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['pins','add','share'][i] === tab);
  });
  document.getElementById('pin-list').style.display = tab === 'pins' ? 'block' : 'none';
  document.getElementById('add-panel').style.display = tab === 'add' ? 'block' : 'none';
  const sp = document.getElementById('share-panel');
  if (tab === 'share') { sp.style.display = 'flex'; updateSharePanel(); }
  else sp.style.display = 'none';
}

/* ---- OVERLAY HINT ---- */
let overlayTimer;
map.on('click', () => {
  clearTimeout(overlayTimer);
  overlayTimer = setTimeout(() => {
    document.getElementById('map-overlay').classList.add('hidden');
  }, 3000);
});

/* ---- DEMO PINS ---- */
function loadDemo() {
  const demo = [
    { id: nextId++, name: 'Big Ben', lat: 51.5007, lng: -0.1246, time: '09:00', day: '26 Mayıs', note: 'Sabah erken git, kalabalık az olur', color: '#4A90D9' },
    { id: nextId++, name: 'Tower Bridge', lat: 51.5055, lng: -0.0754, time: '11:30', day: '26 Mayıs', note: 'Cam zemin için bilet al', color: '#E05555' },
    { id: nextId++, name: 'British Museum', lat: 51.5194, lng: -0.1270, time: '14:00', day: '27 Mayıs', note: 'Rosetta Taşı mutlaka görülmeli', color: '#27AE60' },
  ];
  demo.forEach(p => { pins.push(p); addMarker(p); });
  map.fitBounds([[51.50, -0.13], [51.52, -0.07]], { padding: [40,40] });
  saveToURL();
  renderList();
}

/* ---- INIT ---- */
switchTab('pins');
const hasHash = window.location.hash.length > 1;
if (hasHash) { loadFromURL(); }
else { loadDemo(); }
